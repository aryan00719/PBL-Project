<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login - RouteWise</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-glass);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>

<body>
    <div class="auth-card">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-primary mb-1"><i class="fa-solid fa-route"></i> RouteWise</h1>
            <p class="text-muted text-sm">Welcome back! Please login.</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="toast {{ 'success' if category == 'success' else 'error' }} mb-4"
            style="position:static; transform:none; opacity:1;">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="input-control" required placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="input-control" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary btn-block mt-4">Login</button>
        </form>

        <div class="text-center mt-6 text-sm">
            <span class="text-muted">Don't have an account?</span>
            <a href="/register" class="font-medium">Sign up</a>
        </div>
        <div class="text-center mt-2">
            <a href="/" class="text-xs text-muted">Back to Home</a>
        </div>
    </div>
</body>

</html>
