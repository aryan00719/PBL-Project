<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RouteWise - Smart Travel Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Main Styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}?v=3">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- App Shell -->
  <div class="app-shell">
    
    <!-- Navbar -->
    <header class="app-header">
      <div class="header-brand">
        <i class="fa-solid fa-route text-primary"></i>
        <span>RouteWise</span>
      </div>
      <nav class="header-nav">
        <a href="/" class="btn btn-ghost text-primary font-medium">Planner</a>
        <a href="/history" class="btn btn-ghost">History</a>
        <a href="/logout" class="btn btn-ghost text-xs" style="color: var(--color-error);"><i class="fa-solid fa-sign-out-alt"></i> Logout</a>
      </nav>
    </header>
    
    <!-- Main Layout -->
    <div class="planner-layout">
    
      <!-- Sidebar -->
      <aside class="planner-sidebar">
        
        <div class="mb-6">
          <h2 class="text-lg mb-2">Plan Your Trip</h2>
          <p class="text-muted text-sm">Enter destination and duration to get an optimized itinerary.</p>
        </div>
        
        <div class="card mb-6">
          <div class="form-group">
            <label class="form-label" for="priority-input">Destination City</label>
            <input id="priority-input" class="input-control" type="text" placeholder="e.g. Jaipur, Delhi" autocomplete="off" />
          </div>
          
          <div class="form-group">
            <label class="form-label" for="days-input">Duration (Days)</label>
            <input id="days-input" class="input-control" type="number" min="1" max="14" value="3" />
          </div>
          
          <button id="generate-btn" type="button" class="btn btn-primary btn-block mt-2">
            <i class="fa-solid fa-magic-wand-sparkles"></i> Generate Itinerary
          </button>
        </div>
        
        <!-- Helpful shortcuts or info can go here -->
        <div class="text-center">
            <a href="/history" class="btn btn-secondary btn-block text-sm">
                <i class="fa-solid fa-clock-rotate-left"></i> View Past Trips
            </a>
        </div>
        
      </aside>
      
      <!-- Map Area -->
      <main class="planner-map-area">
        <div id="map" class="w-full h-full"></div>
        
        <!-- Floating Instructions Panel -->
        <div id="route-instructions" class="instruction-box hidden" style="position: absolute; top: 20px; left: 60px; z-index: 1000;">
           <div class="flex justify-between items-center mb-2">
             <h4 class="text-sm font-bold"><i class="fa-solid fa-directions text-primary"></i> Navigation</h4>
             <button id="close-instructions" class="btn btn-ghost p-0 text-xs"><i class="fa-solid fa-times"></i></button>
           </div>
           <div id="instruction-list" class="text-xs text-muted" style="max-height: 200px; overflow-y: auto;">
             <!-- populated by JS -->
           </div>
        </div>
        
        <!-- Collapsible Itinerary Panel -->
        <div id="itinerary-panel" class="itinerary-panel collapsed">
          <div class="p-4 border-b border-gray-200 flex justify-between items-center bg-white sticky top-0 z-10">
             <h3 class="font-bold text-lg">Itinerary</h3>
             <button id="toggle-itinerary" class="btn btn-ghost btn-sm"><i class="fa-solid fa-chevron-right"></i></button>
          </div>
          
          <div id="itinerary" class="p-4">
            <!-- Empty State -->
            <div class="text-center py-10 text-muted">
               <i class="fa-regular fa-map fa-3x mb-4 opacity-50"></i>
               <p>No itinerary generated yet.<br/>Start by entering a city!</p>
            </div>
          </div>
        </div>
        
        <!-- Floating Toggle Button for Itinerary (Visible when collapsed) -->
        <button id="open-itinerary-btn" class="btn btn-primary shadow-lg" style="position: absolute; top: 20px; right: 20px; z-index: 900; display: none;">
           <i class="fa-solid fa-list-ul"></i> View Itinerary
        </button>
        
      </main>
      
    </div>
  </div>
  
  <!-- Loading Overlay -->
  <div id="loading-overlay" class="loader-overlay hidden">
    <div class="spinner mb-4"></div>
    <div class="text-lg font-medium text-main">Generating your perfect trip...</div>
    <div class="text-sm text-muted">Calculating best routes and times</div>
  </div>
  
  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Main Script -->
  <script src="{{ url_for('static', filename='script.js') }}?v=3"></script>
</body>
</html>
